# This version line is optional now, but tells older Docker Compose versions what syntax to expect.
version: "3.8"

# 'services' is the block where we define all the containers we want to run together.
services:
  # 'api' is the name we give to this service.
  # When it runs, Compose will automatically name the container based on the folder + service name (e.g. lablog-api-1)
  # Command line equivalent: --name my-api
  api:
    # 'build' tells Docker to build a new image from our source code instead of pulling an existing one.
    # Command line equivalent: docker build -t lab-log-api .
    build:
      # 'context: .' means use the current directory ('.') to find the files for the build.
      context: .
      # 'dockerfile: Dockerfile' tells it exactly which file contains the build instructions.
      dockerfile: Dockerfile

    # 'ports' maps the ports between your Mac (host) and the container.
    # Format is "HOST_PORT:CONTAINER_PORT"
    # Command line equivalent: -p 4001:8080
    ports:
      - "4001:8080"

    # 'environment' passes environment variables into the container when it runs.
    # Command line equivalent: -e DATABASE_URL=postgresql://...
    environment:
      - DATABASE_URL=postgresql://postgres:password@host.docker.internal:5432/postgres


    # 'volumes' links folders on your Mac directly to folders in the container.
    # This allows you to edit files on your Mac and see changes immediately without rebuilding!
    # Command line equivalent: -v $(pwd):/app -v /app/node_modules
    volumes:
      # We map the current folder on Mac (./) to the /app folder inside the container.
      - ./:/app
      # We use an "anonymous volume" for node_modules so that Docker keeps the Linux version 
      # of the modules installed inside the container, rather than using your Mac's modules.
      - /app/node_modules

      